{% extends 'officer_portal/base.html' %}

{% block title %}Trinetra - Secure Authentication{% endblock %}

{% block content %}
<style>
    /* Full height centering override for main-container */
    .main-container {
        justify-content: center;
        padding-bottom: 100px;
    }

    .login-wrapper {
        position: relative;
        perspective: 1000px;
        z-index: 10;
        animation: floatIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes floatIn {
        0% { opacity: 0; transform: translateY(60px) rotateX(10deg); filter: blur(10px); }
        100% { opacity: 1; transform: translateY(0) rotateX(0deg); filter: blur(0); }
    }

    .login-glass-card {
        background: rgba(12, 16, 26, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 50px 40px;
        width: 440px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
    }

    /* Ambient card glow */
    .login-glass-card::before {
        content: '';
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: radial-gradient(circle at 50% 0%, rgba(0, 229, 255, 0.15), transparent 60%);
        pointer-events: none;
        z-index: -1;
    }
    
    .card-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .shield-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        position: relative;
    }

    .shield-icon svg {
        width: 100%;
        height: 100%;
        fill: none;
        stroke: var(--neon-blue);
        stroke-width: 1.5;
        filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.5));
    }

    .box-title {
        font-family: var(--font-ui);
        font-weight: 700;
        font-size: 28px;
        color: white;
        letter-spacing: 1px;
    }
    
    .box-subtitle {
        font-family: var(--font-code);
        color: var(--text-muted);
        font-size: 13px;
        margin-top: 8px;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .form-group {
        margin-bottom: 24px;
        position: relative;
    }

    .form-label {
        font-family: var(--font-code);
        color: var(--text-muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
        display: block;
        transition: var(--transition-smooth);
    }

    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-icon {
        position: absolute;
        left: 16px;
        width: 20px;
        height: 20px;
        stroke: var(--text-dim);
        fill: none;
        stroke-width: 2;
        transition: var(--transition-smooth);
    }

    .form-input {
        width: 100%;
        padding: 16px 16px 16px 48px;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: white;
        font-family: var(--font-code);
        font-size: 15px;
        transition: var(--transition-bounce);
        outline: none;
    }

    .form-input:focus {
        border-color: var(--neon-blue);
        background: rgba(0, 229, 255, 0.03);
        box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.1);
        transform: translateY(-2px);
    }

    .form-input:focus + .input-icon {
        stroke: var(--neon-blue);
    }

    .btn-login {
        width: 100%;
        background: linear-gradient(135deg, var(--neon-blue), #0077ff);
        color: #000;
        border: none;
        border-radius: 12px;
        padding: 18px;
        font-family: var(--font-ui);
        font-weight: 700;
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: var(--transition-bounce);
        margin-top: 10px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0, 229, 255, 0.2);
    }

    .btn-login:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 30px rgba(0, 229, 255, 0.4);
    }

    .btn-login::after {
        content: '';
        position: absolute;
        top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
        transform: skewX(-20deg);
        transition: 0.5s;
    }

    .btn-login:hover::after {
        left: 150%;
    }

    .biometric-wrapper {
        margin-top: 30px;
        text-align: center;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 30px;
    }

    .btn-biometric {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        color: var(--text-main);
        padding: 14px 24px;
        font-family: var(--font-ui);
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        transition: var(--transition-smooth);
    }

    .btn-biometric svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: var(--neon-purple);
        stroke-width: 2;
        transition: var(--transition-smooth);
    }

    .btn-biometric:hover {
        background: rgba(179, 0, 255, 0.05);
        border-color: var(--neon-purple);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(179, 0, 255, 0.2);
    }
    
    .btn-biometric:hover svg {
        filter: drop-shadow(0 0 8px var(--neon-purple));
    }
</style>

<div class="login-wrapper">
    <div class="login-glass-card">
        
        <div class="card-header">
            <div class="shield-icon">
                <svg viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <path d="M12 8v4"></path>
                    <path d="M12 16h.01"></path>
                </svg>
            </div>
            <div class="box-title">Officer Protocol</div>
            <div class="box-subtitle">Restricted Access Module</div>
        </div>

        <form method="POST">
            {% csrf_token %}
            <!-- HIDDEN FIELD FOR TRAP IDENTIFICATION -->
            <input type="hidden" name="is_trap" value="true">

            <div class="form-group">
                <label class="form-label">Identification</label>
                <div class="input-wrapper">
                    <input type="text" name="username" class="form-input" placeholder="OFF-XXXX-XX" autocomplete="off" required>
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Encryption Key</label>
                <div class="input-wrapper">
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>

            <button type="submit" class="btn-login">Initialize Connection</button>

            <div class="biometric-wrapper">
                <button type="button" class="btn-biometric" onclick="startBiometricLogin()">
                    <svg viewBox="0 0 24 24">
                        <path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10-4.48 10-10 10S2 17.52 2 12z"></path>
                        <path d="M9 12c0-1.66 1.34-3 3-3s3 1.34 3 3"></path>
                        <path d="M6.34 8.34A8 8 0 0 1 12 6a8 8 0 0 1 5.66 2.34"></path>
                        <path d="M17.66 15.66A8 8 0 0 1 12 18a8 8 0 0 1-5.66-2.34"></path>
                    </svg>
                    Biometric Override
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Fake biometric login algorithm for the honeypot
    async function startBiometricLogin() {
        const usernameInput = document.querySelector('input[name="username"]');
        const username = usernameInput ? usernameInput.value : '';

        // Regardless of input, it's a trap so we do not actually authenticate with the WebAuthn API.
        // We simulate a credential request failure (or send fake data to trap endpoint directly)
        try {
            await new Promise(r => setTimeout(r, 600)); // Simulate delay
            
            // For a honeypot, we could try to just prompt for credentials to seem real, 
            // but failing authentication is safer. Alternatively, we just submit the form.
            const form = document.querySelector('form');
            if(username) {
                // If they typed a username, submit the trap form with a fake password indicator
                const pwd = document.querySelector('input[name="password"]');
                pwd.value = "BIOMETRIC_ATTEMPT_LOGGED";
                form.submit();
            } else {
                alert('Biometric Login Error: Device Not Recognized.');
            }
        } catch (e) {
            console.error(e);
        }
    }

    // Add loading animation to submit button
    document.querySelector('form').addEventListener('submit', function() {
        const btn = document.querySelector('.btn-login');
        btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite; margin-right: 10px; display: inline-block; vertical-align: text-bottom;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> AUTHENTICATING...`;
        btn.style.opacity = '0.8';
        btn.style.pointerEvents = 'none';
        btn.style.transform = 'scale(0.98)';
        btn.style.boxShadow = 'none';
    });
</script>
<style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
{% endblock %}
